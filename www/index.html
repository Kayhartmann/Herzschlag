<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Herzschlag</title>
<style>
  html,body{margin:0;height:100%;background:#0a0508;color:#d8c9b8;font-family:sans-serif;}
  #boot{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;box-sizing:border-box;}
  #boot h1{font-size:26px;letter-spacing:2px;color:#e8b84b;margin:0 0 6px;}
  #boot .msg{font-size:12px;color:#8a6a72;margin-top:10px;max-width:300px;line-height:1.6;}
  .pulse{width:14px;height:14px;border-radius:50%;background:#ff3355;margin-top:22px;animation:p 0.9s infinite;}
  @keyframes p{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.6);opacity:1}}
  #retry{display:none;margin-top:18px;padding:10px 22px;border:none;border-radius:8px;background:linear-gradient(90deg,#8f1830,#ff3355);color:#fff;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div id="boot">
  <h1>HERZSCHLAG</h1>
  <div class="pulse"></div>
  <div class="msg" id="boot-msg">Suche nach Aktualisierungen …</div>
  <button id="retry" onclick="location.reload()">Erneut versuchen</button>
</div>
<script>
// ============================================================
// HERZSCHLAG-AUTO-UPDATER (Loader)
// Diese Datei ersetzt www/index.html und wird EINMAL in die APK
// gebaut. Sie holt beim Start immer die aktuelle Spielversion
// (game.html) aus dem GitHub-Repo:
//   - neue Version online  -> laden, lokal cachen, starten
//   - offline              -> zuletzt gecachte Version starten
//   - allererster Start offline -> mitgelieferte Version aus
//     der APK (game-fallback.html) starten
// Das Spiel selbst wird ab jetzt NUR noch in game.html gepflegt.
// ============================================================
const RAW = 'https://raw.githubusercontent.com/Kayhartmann/Herzschlag/main/';

const KEY_VER  = 'hs-loader-version';
const KEY_CODE = 'hs-loader-code';

function msg(t){ const el=document.getElementById('boot-msg'); if(el) el.textContent=t; }

function run(html, updateVersion){
  if(updateVersion){
    html = html.replace('</body>',
      '<script>window.addEventListener("load",function(){try{showToast("🔄 Aktualisiert auf Version '
      + updateVersion + '");}catch(e){}});<\/script></body>');
  }
  document.open();
  document.write(html);
  document.close();
}

async function tryFallback(){
  // Nur in der APK / auf einem Webserver möglich (relatives fetch),
  // nicht bei direkt geöffneter Datei (file://).
  try{
    const res = await fetch('./game-fallback.html', {cache:'no-store'});
    if(res.ok){
      const html = await res.text();
      if(html && html.indexOf('</html>') !== -1){
        msg('Offline – starte mitgelieferte Version …');
        run(html, null);
        return true;
      }
    }
  }catch(e){}
  return false;
}

async function boot(){
  let cachedVer = null, cachedCode = null;
  try{
    cachedVer  = localStorage.getItem(KEY_VER);
    cachedCode = localStorage.getItem(KEY_CODE);
  }catch(e){}

  try{
    const meta = await (await fetch(RAW + 'version.json', {cache:'no-store'})).json();
    if(meta && meta.version && (meta.version !== cachedVer || !cachedCode)){
      msg('Lade Version ' + meta.version + ' …');
      const html = await (await fetch(RAW + 'game.html', {cache:'no-store'})).text();
      if(html && html.indexOf('</html>') !== -1){
        try{
          localStorage.setItem(KEY_CODE, html);
          localStorage.setItem(KEY_VER, meta.version);
        }catch(e){ /* Speicher voll – Spiel startet trotzdem */ }
        run(html, cachedVer ? meta.version : null);
        return;
      }
    } else if(cachedCode){
      run(cachedCode, null);
      return;
    }
  }catch(err){ /* offline oder GitHub nicht erreichbar */ }

  if(cachedCode){
    msg('Offline – starte gespeicherte Version …');
    run(cachedCode, null);
    return;
  }
  if(await tryFallback()) return;

  msg('Der erste Start benötigt eine Internetverbindung, danach ist das Spiel auch offline spielbar.');
  document.getElementById('retry').style.display='inline-block';
}
boot();
</script>
</body>
</html>
